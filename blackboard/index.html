<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de Animais - Sistema de Cadastro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 0;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        .animal-card {
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
        }
        .animal-card .card-title {
            color: #667eea;
            font-weight: bold;
        }
        .badge-animal {
            font-size: 0.9rem;
            padding: 8px 15px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }
        .stats {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .stats .stat-item {
            text-align: center;
            border-right: 1px solid #dee2e6;
        }
        .stats .stat-item:last-child {
            border-right: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header text-center">
            <h1><i class="fas fa-paw"></i> Adoção de Animais</h1>
            <p class="lead">Sistema de cadastro e listagem para adoção responsável</p>
        </div>

        <!-- Toast Container para notificações -->
        <div class="toast-container" id="toastContainer">
            <!-- Toasts serão injetados aqui via JavaScript -->
        </div>

        <!-- Formulário de Cadastro -->
        <div class="row mb-4">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-plus-circle"></i> Novo Cadastro</h5>
                    </div>
                    <div class="card-body">
                        <form id="animalForm">
                            <div class="mb-3">
                                <label for="tipo" class="form-label"><i class="fas fa-tag"></i> Tipo</label>
                                <select class="form-select" id="tipo" required>
                                    <option value="">Selecione o tipo...</option>
                                    <option value="cachorro">Cachorro</option>
                                    <option value="gato">Gato</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="raca" class="form-label"><i class="fas fa-dog"></i> Raça</label>
                                <input type="text" class="form-control" id="raca" placeholder="Ex: Labrador, Persa, etc." required>
                            </div>
                            <div class="mb-3">
                                <label for="caracteristicas" class="form-label"><i class="fas fa-info-circle"></i> Características</label>
                                <textarea class="form-control" id="caracteristicas" rows="3" placeholder="Características do animal..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                                <i class="fas fa-save"></i> Cadastrar Animal
                            </button>
                        </form>
                        <div class="loading" id="loadingForm">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Carregando...</span>
                            </div>
                            <p>Enviando dados...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Estatísticas e Listagem -->
            <div class="col-md-7">
                <div class="stats row">
                    <div class="col-4 stat-item">
                        <h3 id="totalAnimais">0</h3>
                        <p class="text-muted">Total</p>
                    </div>
                    <div class="col-4 stat-item">
                        <h3 id="totalCachorros">0</h3>
                        <p class="text-muted">Cachorros</p>
                    </div>
                    <div class="col-4 stat-item">
                        <h3 id="totalGatos">0</h3>
                        <p class="text-muted">Gatos</p>
                    </div>
                </div>

                <!-- Controles de Listagem -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5><i class="fas fa-list"></i> Animais Disponíveis</h5>
                    <button class="btn btn-outline-primary btn-sm" id="refreshBtn">
                        <i class="fas fa-sync"></i> Atualizar
                    </button>
                </div>

                <!-- Listagem -->
                <div id="animalList">
                    <div class="loading" id="loadingList">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                        <p>Carregando lista de animais...</p>
                    </div>
                    <div id="animalsContainer">
                        <!-- Animais serão injetados aqui via JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API Consumer Script -->
    <script src="api-consumer.js"></script>
    <script>
        // Inicialização da aplicação
        $(document).ready(function() {
            // Carregar lista inicial
            loadAnimals();
            
            // Atualizar estatísticas
            updateStats();
            
            // Configurar refresh
            $('#refreshBtn').click(function() {
                loadAnimals();
                updateStats();
            });
            
            // Configurar formulário
            $('#animalForm').submit(function(e) {
                e.preventDefault();
                submitAnimal();
            });
        });
    </script>
</body>
</html>
